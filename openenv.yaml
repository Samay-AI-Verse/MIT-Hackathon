name: PharmaSim
version: 1.0.0
authors:
  - PharmaSim Team
description: Deterministic pharmacy operations environment for evaluating AI medication-dispensing decisions.
openenv_version: "1.0"
entrypoint:
  module: env.pharmasim_env
  class: PharmaSimEnv
interface:
  step:
    input: env.models.Action
    output:
      observation: env.models.Observation
      reward: env.models.Reward
      done: bool
      info: dict
  reset:
    output: env.models.Observation
  state:
    output: dict
observation_schema: env.models.Observation
action_schema: env.models.Action
reward_schema: env.models.Reward
tasks:
  - tasks.task_easy
  - tasks.task_medium
  - tasks.task_hard
deployment:
  type: docker
  healthcheck: /
